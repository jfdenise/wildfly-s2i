name: concurrent testing images POC
on:
  push:
    branches:
      - "concurrent_testing"
env:
  LANG: en_US.UTF-8
  S2I_URI: https://github.com/openshift/source-to-image/releases/download/v1.3.1/source-to-image-v1.3.1-a5a77147-linux-amd64.tar.gz
  WILDFLY_S2I_BUILDER_IMAGE: test-wildfly-s2i
  WILDFLY_S2I_RUNTIME_IMAGE: test-wildfly-runtime
  V2_QUAY_REPO: ${{ secrets.V2_QUAY_REPO }}
  V2_QUAY_USERNAME: ${{ secrets.V2_QUAY_USERNAME }}
  # The image to copy in docker daemon for testing
  UBUNTU_ARCHITECTURE_IMAGE: linuxamd64
  BEHAVE_TIMEOUT: 60
jobs:
  build_images:
    name: Wildfly-s2i Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # workaround for https://github.com/actions/runner-images/issues/10443
        os: [ubuntu-latest]
        jdk: [jdk21, jdk25]
    steps:
      - name: Update hosts - linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cat /etc/hosts
          sudo bash -c "echo '127.0.0.1   localhost localhost.localdomain localhost4 localhost4.localdomain4' > /etc/hosts"
          sudo bash -c "echo '::1         localhost localhost.localdomain localhost6 localhost6.localdomain6' >> /etc/hosts"
          sudo sysctl -w fs.file-max=2097152
      - uses: actions/checkout@v2
      - name: Check quay.io configuration
        if: (env.V2_QUAY_USERNAME == '' || env.V2_QUAY_REPO == '')
        run: |
          echo "quay.io configuration is incomplete, can't push to quay.io. To push built images to quay.io, please ensure the secrets V2_QUAY_REPO, V2_QUAY_USERNAME and V2_QUAY_PASSWORD are created in the project."
          exit 1
      - name: Install qemu dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
      - name: Setup required system packages
        run: |
          sudo apt-get update
          sudo apt-get install krb5-multidev libkrb5-dev
      - name: Verify latest ubi10-minimal
        run: |
          podman pull registry.access.redhat.com/ubi10/ubi-minimal
          podman image ls | grep ubi10
      - name: Setup Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: '3.11.5'
      - name: Setup virtualenv and install cekit and required packages
        run: |
          python --version
          sudo pip install virtualenv
          mkdir ~/cekit
          python3 -m venv ~/cekit
          . ~/cekit/bin/activate
          pip install cekit docker docker-squash odcs behave lxml packaging
      - name: install s2i binary
        run: |
          echo ===== Installing s2i from ${{ env.S2I_URL }} =====
          mkdir /tmp/s2i/ && cd /tmp/s2i/
          wget ${{ env.S2I_URI }}
           tar xvf source-to-image*.gz
           sudo mv s2i /usr/bin
           which s2i
           s2i version
      - name: Build DockerFile files
        run: |
          echo "Docker Images prior to build wildfly-s2i images"
          podman image ls
          . ~/cekit/bin/activate
          pushd wildfly-builder-image
          WILDFLY_IMAGE_VERSION=$(yq e ".version" ${{ matrix.jdk }}-overrides.yaml)
          echo "WILDFLY_IMAGE_VERSION=${WILDFLY_IMAGE_VERSION}" >> $GITHUB_ENV
          JDK_VERSION=${{ matrix.jdk }}
          ORGANIZATION=${{ secrets.V2_QUAY_REPO }}
          RELEASED_IMAGES="true"
          QUAY_IMAGE_VERSION="latest-${{ matrix.jdk }}"
          # Compute tags common to all images
          WILDFLY_IMAGE_TAGS="${QUAY_IMAGE_VERSION}"
          echo "WILDFLY_IMAGE_TAGS=${WILDFLY_IMAGE_TAGS}" >> $GITHUB_ENV
          echo "ORGANIZATION=${ORGANIZATION}" >> $GITHUB_ENV
          echo "QUAY_IMAGE_VERSION=${QUAY_IMAGE_VERSION}" >> $GITHUB_ENV
          cekit build --dry-run --overrides=${{ matrix.jdk }}-overrides.yaml docker
          popd
          pushd wildfly-runtime-image
          cekit build --dry-run --overrides=${{ matrix.jdk }}-overrides.yaml docker
          popd
      - name: Buildah multi archs Builder Build
        id: build_builder_image
        uses: redhat-actions/buildah-build@v2.10
        with:
          image: ${{ env.WILDFLY_S2I_BUILDER_IMAGE }}
          tags: ${{ env.WILDFLY_IMAGE_TAGS }}
          context: ./wildfly-builder-image/target/image
          platforms: linux/amd64, linux/arm64, linux/ppc64le
          containerfiles: |
            ./wildfly-builder-image/target/image/Dockerfile
      - name: Buildah multi archs Runtime Build
        id: build_runtime_image
        uses: redhat-actions/buildah-build@v2.10
        with:
          image: ${{ env.WILDFLY_S2I_RUNTIME_IMAGE }}
          tags: ${{ env.WILDFLY_IMAGE_TAGS }}
          context: ./wildfly-runtime-image/target/image
          platforms: linux/amd64, linux/arm64, linux/ppc64le
          containerfiles: |
            ./wildfly-runtime-image/target/image/Dockerfile
      - name: Push Builder Image To Quay
        uses: redhat-actions/push-to-registry@v2.6
        id: push-builder
        with:
          image: ${{ steps.build_builder_image.outputs.image }}
          tags: ${{ steps.build_builder_image.outputs.tags }}
          registry: quay.io/${{ env.ORGANIZATION }}
          username: ${{ secrets.V2_QUAY_USERNAME }}
          password: ${{ secrets.V2_QUAY_PASSWORD }}
      - name: Push Runtime Image To Quay
        uses: redhat-actions/push-to-registry@v2.6
        id: push-runtime
        with:
          image: ${{ steps.build_runtime_image.outputs.image }}
          tags: ${{ steps.build_runtime_image.outputs.tags }}
          registry: quay.io/${{ env.ORGANIZATION }}
          username: ${{ secrets.V2_QUAY_USERNAME }}
          password: ${{ secrets.V2_QUAY_PASSWORD }}
  basic_test:
    name: basic tests
    runs-on: ${{ matrix.os }}
    needs: build_images
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        jdk: [jdk21, jdk25]
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: '3.11.5'
      - name: Setup virtualenv and install cekit and required packages
        run: |
          python --version
          sudo pip install virtualenv
          mkdir ~/cekit
          python3 -m venv ~/cekit
          . ~/cekit/bin/activate
          pip install cekit docker docker-squash odcs behave lxml packaging
      - name: install s2i binary
        run: |
          echo ===== Installing s2i from ${{ env.S2I_URL }} =====
          mkdir /tmp/s2i/ && cd /tmp/s2i/
          wget ${{ env.S2I_URI }}
           tar xvf source-to-image*.gz
           sudo mv s2i /usr/bin
           which s2i
           s2i version
      - name: Behave Tests basic
        run: |
          . ~/cekit/bin/activate
          pushd wildfly-builder-image
          docker pull quay.io/${{ secrets.V2_QUAY_REPO }}/${{ env.WILDFLY_S2I_BUILDER_IMAGE }}:latest-${{ matrix.jdk }}
          cekit test --image=quay.io/${{ secrets.V2_QUAY_REPO }}/${{ env.WILDFLY_S2I_BUILDER_IMAGE }}:latest-${{ matrix.jdk }} behave --include-re basic > test-logs-basic-${{ matrix.os }}-${{ matrix.jdk }}.txt 2>&1
          rm test-logs-basic-${{ matrix.os }}-${{ matrix.jdk }}.txt
          popd
          docker system prune -f
      - name: Advertise Failing Behave Scenarios
        if: failure()
        run: |
          pushd wildfly-builder-image
          logFile=$(find . -type f -iname "test-logs-*.txt")
          if [ -f "${logFile}" ]; then
            # Remove tar noise
            grep -v "tar.go:" ${logFile} > tmpFile && mv tmpFile ${logFile}
            # Display failing scenario
            grep -A10000 "Errored scenarios" ${logFile}
          else
            echo "No failure in behave tests"
          fi
          popd
      - name: Upload Test Reports on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: wildfly-s2i-test-logs-${{ matrix.os }}-${{ matrix.jdk }}
          path: |
           wildfly-builder-image/test-logs-*.txt
           /tmp/*.wfs2i.log
